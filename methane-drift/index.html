<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Methane Drift</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="hud-panel">
        <a href="/" class="back-link" data-i18n="backToGames">&larr; Back to Games</a>
        <h1 data-i18n="methaneDriftTitle">Methane Drift</h1>
        <p id="mdInstructions">
          Fly through an alien sky. <strong>Space / Tap</strong> = go up.
          <strong>Shift</strong> = shield. Fly close to obstacles for <strong>bonus points</strong>.
          Press <strong>Esc</strong> to pause (shows all controls).
        </p>
        <div class="stats">
          <div><span data-i18n="score">Score</span><strong id="score" aria-live="polite" role="status">0</strong></div>
          <div><span data-i18n="best">Best</span><strong id="best">0</strong></div>
          <div><span data-i18n="mdAirType">Air Type</span><strong id="density">Light</strong></div>
          <div><span data-i18n="mdShield">Shield</span><strong id="symbiosis">Ready</strong></div>
          <div><span data-i18n="combo">Combo</span><strong id="combo">0</strong></div>
        </div>
        <button id="muteBtn" class="mute-btn" type="button" aria-label="Toggle sound" data-i18n="soundOn">Sound: ON</button>
        <button id="fullscreenBtn" class="fullscreen-btn" type="button" aria-label="Toggle fullscreen" data-i18n="mdFullscreen">Fullscreen</button>
        <button id="restartBtn" class="restart-btn" hidden data-i18n="mdPlayAgain">Play Again</button>
        <button id="symbiosisBtn" class="symbiosis-action-btn" hidden aria-label="Activate Shield" data-i18n="mdShieldBtnLabel">Shield</button>
      </section>
      <canvas id="game" class="game-canvas" width="960" height="540" aria-label="Methane Drift game"></canvas>
    </main>
    <script src="/i18n.js"></script>
    <script src="audio.js"></script>
    <script src="game.js"></script>
  </body>
</html>
