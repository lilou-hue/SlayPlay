<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Methane Drift</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="hud-panel">
        <a href="/" class="back-link">&larr; Back to Games</a>
        <h1>Methane Drift</h1>
        <p>
          Fly through an alien sky. <strong>Space / Tap</strong> = go up.
          <strong>Shift</strong> = shield. Fly close to obstacles for <strong>bonus points</strong>.
          Press <strong>Esc</strong> to pause (shows all controls).
        </p>
        <div class="stats">
          <div><span>Score</span><strong id="score" aria-live="polite" role="status">0</strong></div>
          <div><span>Best</span><strong id="best">0</strong></div>
          <div><span>Air Type</span><strong id="density">Light</strong></div>
          <div><span>Shield</span><strong id="symbiosis">Ready</strong></div>
          <div><span>Combo</span><strong id="combo">0</strong></div>
        </div>
        <button id="muteBtn" class="mute-btn" type="button" aria-label="Toggle sound">Sound: ON</button>
        <button id="fullscreenBtn" class="fullscreen-btn" type="button" aria-label="Toggle fullscreen">Fullscreen</button>
        <button id="restartBtn" class="restart-btn" hidden>Play Again</button>
        <button id="symbiosisBtn" class="symbiosis-action-btn" hidden aria-label="Activate Shield">Shield</button>
      </section>
      <canvas id="game" class="game-canvas" width="960" height="540" aria-label="Methane Drift game"></canvas>
    </main>
    <script src="audio.js"></script>
    <script src="game.js"></script>
  </body>
</html>
