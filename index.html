<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>Flappy Bird Mobile</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <h1>Flappy Bird</h1>
      <p class="hint">Tap the game area to flap. Press space on desktop.</p>
      <canvas id="game" width="360" height="640" aria-label="Flappy Bird game"></canvas>
      <div class="controls">
        <button id="restart" type="button" hidden>Restart</button>
      </div>
    </main>
    <script src="game.js"></script>
  </body>
</html>
