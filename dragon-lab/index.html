<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dragon Engineering Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <h1 class="app-title">Dragon Engineering Lab</h1>
      <span class="app-subtitle">Biological Systems Simulation</span>
    </div>
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="build">Build</button>
      <button class="tab-btn" data-tab="simulate">Simulate</button>
      <button class="tab-btn" data-tab="habitat">Habitat</button>
      <button class="tab-btn" data-tab="battle">Battle</button>
      <button class="tab-btn" data-tab="science">Science Notes</button>
    </nav>
    <div class="header-right">
      <button class="btn-icon" id="btn-tutorial" title="Replay Tutorial">?</button>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <main class="app-main">
    <!-- LEFT PANEL: Controls -->
    <aside class="panel panel-left" id="controls-panel">
      <!-- Action buttons -->
      <div class="action-bar">
        <button class="btn-primary" id="btn-simulate">Run Simulation</button>
        <button class="btn-secondary" id="btn-randomize">Randomize</button>
        <button class="btn-secondary" id="btn-reset">Reset</button>
        <button class="btn-secondary" id="btn-save">Save</button>
      </div>

      <!-- Presets -->
      <div class="presets-section">
        <div class="section-label">Presets</div>
        <div id="presets-container" class="presets-row"></div>
      </div>

      <!-- Sliders -->
      <div id="sliders-container" class="sliders-container"></div>
    </aside>

    <!-- CENTER: 3D Canvas -->
    <section class="panel panel-center">
      <div id="canvas-container" class="canvas-container"></div>
    </section>

    <!-- RIGHT PANEL: Results / Context -->
    <aside class="panel panel-right">
      <!-- BUILD TAB -->
      <div class="tab-content active" id="tab-build">
        <div class="panel-title">Quick Preview</div>
        <div id="results-content" class="results-content">
          <p class="placeholder-text">Adjust traits and run a simulation to see results.</p>
        </div>
      </div>

      <!-- SIMULATE TAB -->
      <div class="tab-content" id="tab-simulate">
        <div class="panel-title">Simulation Results</div>
        <div id="results-content-sim" class="results-content"></div>
      </div>

      <!-- HABITAT TAB -->
      <div class="tab-content" id="tab-habitat">
        <div class="panel-title">Habitat Testing</div>
        <div id="habitat-selector" class="habitat-selector"></div>
        <div id="habitat-results" class="habitat-results"></div>
        <button class="btn-secondary" id="btn-hab-return" style="margin-top:12px">Reset Environment</button>
      </div>

      <!-- BATTLE TAB -->
      <div class="tab-content" id="tab-battle">
        <div class="panel-title" id="battle-panel">Battle Arena</div>
        <div id="battle-setup" class="battle-setup"></div>
        <div id="battle-display" class="battle-display" style="display:none"></div>
      </div>

      <!-- SCIENCE NOTES TAB -->
      <div class="tab-content" id="tab-science">
        <div class="panel-title">Research Database</div>
        <div id="science-notes-content" class="science-notes-content"></div>
      </div>
    </aside>
  </main>

  <!-- SCRIPTS (load order matters) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.135.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.135.0/examples/js/controls/OrbitControls.js"></script>
  <script src="data.js?v=3"></script>
  <script src="dragon.js?v=3"></script>
  <script src="simulation.js?v=3"></script>
  <script src="explanations.js?v=3"></script>
  <script src="dragon-canvas.js?v=3"></script>
  <script src="scene.js?v=3"></script>
  <script src="battle.js?v=3"></script>
  <script src="ui.js?v=3"></script>
  <script src="tutorial.js?v=3"></script>
  <script src="main.js?v=3"></script>
</body>
</html>
