<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Lumina</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game">
      <header class="game__header">
        <a href="/" class="back-link" data-i18n="backToGames">&larr; Back to Games</a>
        <h1 data-i18n="luminaTitle">Lumina</h1>
        <p data-i18n="luInstructions">Arrow keys or touch to move. Space or tap to pulse light. Descend into the depths.</p>
      </header>
      <section class="game__panel">
        <canvas id="gameCanvas" width="480" height="720" aria-label="Lumina game"></canvas>
        <div class="game__hud">
          <div class="hud__score">
            <span data-i18n="depth">Depth</span>
            <strong id="score">0</strong>
          </div>
          <div class="hud__score">
            <span data-i18n="best">Best</span>
            <strong id="bestScore">0</strong>
          </div>
          <button id="muteButton" class="hud__mute" type="button" aria-label="Toggle sound">&#x1F50A;</button>
          <button id="restartButton" class="hud__button" type="button" data-i18n="restart">Restart</button>
        </div>
      </section>
      <footer class="game__footer">
        <p data-i18n="luTip">Tip: Collect shards to keep your light alive &mdash; the darkness hungers.</p>
      </footer>
    </main>
    <script src="/i18n.js"></script>
    <script src="game.js"></script>
  </body>
</html>
