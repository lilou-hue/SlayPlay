<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Phantom Road</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="../i18n.js"></script>
  </head>
  <body>
    <main class="game">
      <header class="game__header">
        <a href="/" class="back-link" data-i18n="backToGames">&larr; Back to Games</a>
        <h1 data-i18n="phantomRoadTitle">Phantom Road</h1>
        <p data-i18n="prInstructions">Steer through the dark. Your headlights are all you have.</p>
      </header>
      <section class="game__panel">
        <canvas id="gameCanvas" width="480" height="720" aria-label="Phantom Road game"></canvas>
        <div class="game__hud">
          <div class="hud__score">
            <span data-i18n="prDistanceLabel">Distance</span>
            <strong id="score">0</strong>
          </div>
          <div class="hud__score">
            <span data-i18n="best">Best</span>
            <strong id="bestScore">0</strong>
          </div>
          <button id="muteButton" class="hud__mute" type="button" aria-label="Toggle sound">&#x1F50A;</button>
          <button id="restartButton" class="hud__button" type="button" data-i18n="restart">Restart</button>
        </div>
      </section>
      <footer class="game__footer">
        <p data-i18n="prTip">Chain near-misses &amp; coins for combos &mdash; collect power-ups &amp; evade the police!</p>
      </footer>
    </main>
    <script src="game.js"></script>
  </body>
</html>
